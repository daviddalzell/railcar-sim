name: Test & Deploy

on:
  push:
    branches: [feature/cloud-migration, main]   # runs CI (test + lint) only; deploy is gated separately
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 10 * * *'   # 5am Chicago (UTC-5/UTC-6) — nightly deploy window
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'urgent fix'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          AUTH_DISABLED: "true"
        run: pytest tests/ -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

  deploy:
    name: Deploy to Fly.io
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    environment: production   # requires manual approval in GitHub settings
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Smoke test — health check
        run: |
          for i in $(seq 1 12); do
            echo "Attempt $i/12..."
            if curl --silent --fail "${{ secrets.WAYPOINT_URL }}/health"; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 2 minutes."
          exit 1
