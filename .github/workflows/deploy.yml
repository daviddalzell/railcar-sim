name: Test & Deploy

on:
  push:
    branches: [feature/cloud-migration, main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          AUTH_DISABLED: "true"
        run: pytest tests/ -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check . --select E,F,W --ignore E501,F401

  deploy:
    name: Deploy to Fly.io
    needs: [test, lint]
    runs-on: ubuntu-latest
    # Only deploy on pushes to these branches, not on PRs
    if: github.event_name == 'push'
    environment: production   # requires manual approval in GitHub settings
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Smoke test — health check
        run: |
          sleep 10
          curl --fail "${{ secrets.WAYPOINT_URL }}/health"
