# fly.toml — Waypoint on Fly.io
# Replace "waypoint-app" with your actual app name after running: flyctl launch
app = "waypoint-app"
primary_region = "ord"   # Chicago; change to the region closest to your users

[build]

[env]
  LOG_FORMAT = "json"
  PORT       = "8000"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1        # keep 1 alive to avoid cold starts

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
