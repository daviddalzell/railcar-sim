services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waypoint
      POSTGRES_PASSWORD: waypoint
      POSTGRES_DB: waypoint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waypoint"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://waypoint:waypoint@db:5432/waypoint
      # Copy your .env values here for local Docker dev, or use env_file:
      # GEMINI_API_KEY: ...
      # ANTHROPIC_API_KEY: ...
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads  # local fallback for file storage
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
